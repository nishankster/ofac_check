AWSTemplateFormatVersion: "2010-09-09"
Description: >
  OFAC Screening API — ECS Fargate service behind an Application Load Balancer.

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Logical environment name used for resource tagging.

  ImageUri:
    Type: String
    Description: >
      Full ECR image URI, e.g.
      123456789012.dkr.ecr.us-east-1.amazonaws.com/ofac-screening-api:latest

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy the ECS service and ALB into.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two public subnets for the ALB (must span ≥ 2 AZs).

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two private subnets for the ECS tasks.

  DesiredCount:
    Type: Number
    Default: 2
    Description: Number of ECS tasks to run.

  JwtSecretArn:
    Type: String
    Description: >
      ARN of the Secrets Manager secret containing JWT_SECRET_KEY
      (plain-text secret value, not JSON).

  ApiKeysSecretArn:
    Type: String
    Description: >
      ARN of the Secrets Manager secret containing the comma-separated API_KEYS
      (plain-text secret value, not JSON).

  JwtExpireMinutes:
    Type: Number
    Default: 60
    Description: JWT token lifetime in minutes.

  CertificateArn:
    Type: String
    Default: ""
    Description: >
      Optional ACM certificate ARN for HTTPS. When provided the ALB listener
      uses HTTPS/443 and HTTP/80 redirects to HTTPS. Leave blank for HTTP only.

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]

# ── Resources ──────────────────────────────────────────────────────────────────

Resources:

  # ── CloudWatch Log Group ────────────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/ofac-screening-api
      RetentionInDays: 30

  # ── ECR Repository ──────────────────────────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: ofac-screening-api
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256

  # ── ECS Cluster ─────────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ofac-api-${EnvironmentName}
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ── IAM: Task Execution Role (used by ECS agent to pull image + read secrets)
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ofac-api-execution-role-${EnvironmentName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref JwtSecretArn
                  - !Ref ApiKeysSecretArn

  # ── IAM: Task Role (runtime permissions for the application process itself) ─
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ofac-api-task-role-${EnvironmentName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  # ── Security Groups ─────────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP/HTTPS to the ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  # ── ALB ─────────────────────────────────────────────────────────────────────
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ofac-api-alb-${EnvironmentName}
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ofac-api-tg-${EnvironmentName}
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      # Give tasks time to download the SDN XML on first boot
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "false"

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── ECS Task Definition ─────────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: ofac-screening-api
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: ofac-api
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Secrets:
            - Name: JWT_SECRET_KEY
              ValueFrom: !Ref JwtSecretArn
            - Name: API_KEYS
              ValueFrom: !Ref ApiKeysSecretArn
          Environment:
            - Name: JWT_EXPIRE_MINUTES
              Value: !Sub "${JwtExpireMinutes}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/ofac-screening-api
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - >-
                python -c "import urllib.request, sys;
                r = urllib.request.urlopen('http://localhost:8000/health', timeout=8);
                sys.exit(0 if r.status == 200 else 1)"
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 120
          StopTimeout: 30
          Ulimits:
            - Name: nofile
              SoftLimit: 65536
              HardLimit: 65536

  # ── ECS Service ─────────────────────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - HTTPListener
    Properties:
      ServiceName: !Sub ofac-api-${EnvironmentName}
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: ofac-api
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      HealthCheckGracePeriodSeconds: 120

  # ── Auto Scaling ─────────────────────────────────────────────────────────────
  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: 2
      MaxCapacity: 10
      ResourceId: !Sub service/${ECSCluster}/${ECSService.Name}
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService

  AutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ofac-api-cpu-tracking
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

# ── Outputs ────────────────────────────────────────────────────────────────────

Outputs:
  LoadBalancerDNS:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub ${EnvironmentName}-ofac-api-alb-dns

  ECRRepositoryUri:
    Description: ECR repository URI — use this as ImageUri in future deploys
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}
    Export:
      Name: !Sub ${EnvironmentName}-ofac-api-ecr-uri

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${EnvironmentName}-ofac-api-cluster

  ECSServiceName:
    Description: ECS service name
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub ${EnvironmentName}-ofac-api-service
